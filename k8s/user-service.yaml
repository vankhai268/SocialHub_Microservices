apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      tolerations:
      - key: "cloud.google.com/gke-spot"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      
      containers:
      - name: user-service
        image: IMAGE_PLACEHOLDER_USER_SERVICE
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: PORT
          value: "5000"
        - name: PG_HOST
          valueFrom:
            configMapKeyRef:
              name: socialhub-config
              key: PG_HOST
        - name: PG_PORT
          valueFrom:
            configMapKeyRef:
              name: socialhub-config
              key: PG_PORT
        - name: PG_USER
          valueFrom:
            configMapKeyRef:
              name: socialhub-config
              key: PG_USER
        - name: PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: socialhub-secrets
              key: PG_PASSWORD
        - name: PG_DATABASE
          valueFrom:
            configMapKeyRef:
              name: socialhub-config
              key: PG_DATABASE_USER
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: socialhub-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: socialhub-config
              key: REDIS_PORT
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: socialhub-secrets
              key: JWT_SECRET
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: socialhub-secrets
              key: JWT_REFRESH_SECRET

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  ports:
  - port: 5000
    targetPort: 5000
  selector:
    app: user-service
