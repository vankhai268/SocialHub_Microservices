apiVersion: v1
kind: Secret
metadata:
  name: socialhub-secrets
  labels:
    app: socialhub
type: Opaque
data:
  # Base64 encoded values for production configuration
  # "congdaojwttoken123" -> Y29uZ2Rhb2p3dHRva2VuMTIz
  JWT_SECRET: Y29uZ2Rhb2p3dHRva2VuMTIz
  JWT_REFRESH_SECRET: Y29uZ2Rhb2p3dHRva2VuMTIz
  
  # "socialhub_secret" -> c29jaWFsaHViX3NlY3JldA==
  PG_PASSWORD: c29jaWFsaHViX3NlY3JldA==
  
  # "socialhub_secret" -> c29jaWFsaHViX3NlY3JldA==
  MONGO_PASSWORD: c29jaWFsaHViX3NlY3JldA==

  # Nếu dùng GCS XML API, đây là HMAC Access Key và Secret Key của Service Account
  # "google-hmac-access-key" -> Z29vZ2xlLWhtYWMtYWNjZXNzLWtleQ==
  # "google-hmac-secret-key" -> Z29vZ2xlLWhtYWMtc2VjcmV0LWtleQ==
  MINIO_ACCESS_KEY: Z29vZ2xlLWhtYWMtYWNjZXNzLWtleQ==
  MINIO_SECRET_KEY: Z29vZ2xlLWhtYWMtc2VjcmV0LWtleQ==
