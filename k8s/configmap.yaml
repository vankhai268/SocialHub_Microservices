apiVersion: v1
kind: ConfigMap
metadata:
  name: socialhub-config
  labels:
    app: socialhub
data:
  ENVIRONMENT: "production"
  
  # --- Service Internal Ports & URLs (K8s Service DNS Names) ---
  PORT: "5000"
  USER_SERVICE_URL: "http://user-service:5000"
  FRIEND_SERVICE_URL: "http://friend-service:5000"
  POST_SERVICE_URL: "http://post-service:5000"
  CHAT_SERVICE_URL: "http://chat-service:5000"
  MEDIA_SERVICE_URL: "http://media-service:5000"
  NOTIFICATION_SERVICE_URL: "http://notification-service:5000"

  # --- Database & Redis Hosts (Hãy cập nhật IP Private của GCP Cloud SQL và Memorystore) ---
  PG_HOST: "10.128.0.2" # Thay thế bằng IP Private của Cloud SQL của bạn
  PG_PORT: "5432"
  PG_USER: "socialhub"
  PG_DATABASE_USER: "socialhub_user"
  PG_DATABASE_FRIEND: "socialhub_friend"
  PG_DATABASE_POST: "socialhub_post"
  
  REDIS_HOST: "10.0.0.3" # Thay thế bằng IP Private của Memorystore Redis của bạn
  REDIS_PORT: "6379"
  REDIS_URL: "redis://10.0.0.3:6379" # Thay thế bằng IP Private tương ứng
  
  # --- MongoDB Atlas Connection ---
  MONGO_URI: "mongodb+srv://socialhub:socialhub_secret@cluster.mongodb.net/socialhub?retryWrites=true&w=majority" # Thay thế bằng MongoDB Atlas URI của bạn

  # --- Google Cloud Storage (S3 XML API Compatible) ---
  MINIO_ENDPOINT: "storage.googleapis.com"
  MINIO_PORT: "443"
  MINIO_USE_SSL: "true"
  MINIO_BUCKET_NAME: "socialhub-media-bucket-1" # Tên GCS Bucket đã tạo ở Bước 4
  PRESIGNED_URL_TTL: "900"
  MAX_FILE_SIZE: "10485760"
  MAX_VIDEO_SIZE: "104857600"
