  # ─── Infrastructure ─────────────────────────────

  pg:
    image: postgres:16-alpine
    command: postgres -c shared_buffers=128MB -c max_connections=50
    ports:
      - "${PG_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${PG_DATABASE:-socialhub}
      POSTGRES_USER: ${PG_USER:-socialhub}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-socialhub_secret}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./scripts/init-pg.sql:/docker-entrypoint-initdb.d/init-pg.sql
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-socialhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    command: mongod --wiredTigerCacheSizeGB 0.25
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-socialhub}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-socialhub_secret}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-socialhub}
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-socialhub_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-socialhub_minio_secret}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-socialhub}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-socialhub_secret}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  pg-data:
  mongo-data:
  redis-data:
  minio-data:
