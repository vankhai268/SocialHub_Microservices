# =======================================================================
# chat-service — Complete Service Contract
# =======================================================================
# Bounded Context: Messaging
# Responsibility: 1-1 messaging, group chat, realtime via Socket.IO
# Database: MongoDB
# Realtime: Socket.IO with Redis adapter (horizontal scaling)
# Events Published: Redis Pub/Sub (message.sent, group.member.added)
# =======================================================================

openapi: 3.0.3

info:
  title: chat-service — Messaging
  description: |
    Manages real-time messaging: 1-1 conversations, group chats, message history,
    typing indicators, and online presence. Uses Socket.IO for realtime communication
    with Redis adapter for multi-instance support.
  version: 1.0.0

servers:
  - url: http://localhost:5004
    description: Local development (direct)
  - url: http://localhost:8080/api
    description: Local development (via API Gateway)

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [System]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # ── Conversations (1-1) ──────────────────────────────────────────────

  /conversations:
    get:
      summary: List conversations
      operationId: listConversations
      tags: [Conversations]
      security:
        - bearerAuth: []
      description: |
        Returns all conversations (1-1 and groups) for the authenticated user,
        ordered by last message time (newest first).
        Each conversation includes the last message preview.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        '200':
          description: List of conversations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedConversations'

    post:
      summary: Create a 1-1 conversation
      operationId: createConversation
      tags: [Conversations]
      security:
        - bearerAuth: []
      description: |
        Creates a new 1-1 conversation between the authenticated user and another user.
        If a conversation already exists between the two users, returns the existing one.
        Derived from: DDD 2.3 command "CreateConversation"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [participantId]
              properties:
                participantId:
                  type: string
                  format: uuid
                  description: The other user to start a conversation with
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '200':
          description: Existing conversation returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '400':
          description: Cannot create conversation with self

  /conversations/{id}/messages:
    get:
      summary: Get message history
      operationId: getMessages
      tags: [Conversations]
      security:
        - bearerAuth: []
      description: |
        Returns message history for a conversation, ordered by newest first.
        Uses cursor-based pagination (before a specific message ID) for efficient
        infinite scroll loading.
        Only participants of the conversation can access.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Conversation ID or Group ID
        - name: before
          in: query
          schema:
            type: string
          description: Message ID — returns messages before this one (cursor)
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
      responses:
        '200':
          description: Messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageHistory'
        '403':
          description: Not a participant of this conversation

  # ── Group Chat ────────────────────────────────────────────────────────

  /groups:
    post:
      summary: Create a group chat
      operationId: createGroupChat
      tags: [Groups]
      security:
        - bearerAuth: []
      description: |
        Creates a new group chat. The creator becomes the admin.
        At least 1 other member must be specified (min 2 total including creator).
        Publishes "group.member.added" event for each member.
        Derived from: DDD 2.3 command "CreateGroupChat"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupChat'
        '400':
          description: Invalid request (empty name, no members)

  /groups/{id}:
    get:
      summary: Get group info
      operationId: getGroupInfo
      tags: [Groups]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Group details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupChat'
        '404':
          description: Group not found

    put:
      summary: Update group info
      operationId: updateGroupChat
      tags: [Groups]
      security:
        - bearerAuth: []
      description: |
        Updates group name and/or avatar. Only group admin can update.
        Derived from: DDD 2.3 command "UpdateGroupChat"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                avatarUrl:
                  type: string
                  format: uri
                  nullable: true
      responses:
        '200':
          description: Group updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupChat'
        '403':
          description: Only admin can update group info

  /groups/{id}/members:
    post:
      summary: Add a member to the group
      operationId: addGroupMember
      tags: [Groups]
      security:
        - bearerAuth: []
      description: |
        Adds a new member to the group. Only admin can add members.
        Publishes "group.member.added" event for notification.
        Derived from: DDD 2.3 command "AddGroupMember"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Member added
        '403':
          description: Only admin can add members
        '409':
          description: User is already a member

  /groups/{id}/members/{userId}:
    delete:
      summary: Remove a member from the group
      operationId: removeGroupMember
      tags: [Groups]
      security:
        - bearerAuth: []
      description: |
        Removes a member from the group. Admin can remove any member.
        Non-admin members can only remove themselves (leave).
        Derived from: DDD 2.3 command "RemoveGroupMember"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Member removed
        '403':
          description: Not authorized to remove this member

  /groups/{id}/leave:
    post:
      summary: Leave a group
      operationId: leaveGroup
      tags: [Groups]
      security:
        - bearerAuth: []
      description: |
        Authenticated user leaves the group. If the user is admin and there are
        other members, admin role is transferred to the oldest member.
        If the user is the last member, the group is deleted.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Left the group

# =======================================================================
# SECTION 2 — Socket.IO Events (x-socketio-events extension)
# =======================================================================
# Socket.IO connection: ws://localhost:5004 (or via Gateway ws://localhost:8080)
# Authentication: JWT token passed in handshake auth: { token: "Bearer ..." }
# Namespace: / (default)
#
# On connect:
#   1. Validate JWT from handshake
#   2. Join user-specific room: `user:{userId}`
#   3. Join all conversation rooms: `conv:{conversationId}`
#   4. Set online presence in Redis: online:{userId}
#   5. Broadcast "user:online" to friends
#
# On disconnect:
#   1. Remove online presence from Redis
#   2. Broadcast "user:offline" to friends
# =======================================================================

x-socketio-events:
  enabled: true
  namespace: /
  authentication: JWT in handshake auth object

  client-to-server:
    - event: "message:send"
      description: Client sends a message in a conversation or group
      payload:
        conversationId: string (conversation or group ID)
        content: string (message text)
        type: string (text | image), default "text"
        mediaId: string (uuid, optional — if type is "image")
      response:
        event: "message:received"
        broadcast: to conversation room
      analysisRef: "DDD 2.3 command: SendMessage"

    - event: "message:read"
      description: Client marks messages as read up to a specific message
      payload:
        conversationId: string
        messageId: string (read up to this message)
      response:
        event: "message:read:ack"
        broadcast: to conversation room

    - event: "typing:start"
      description: Client starts typing in a conversation
      payload:
        conversationId: string
      response:
        event: "typing:indicator"
        broadcast: to conversation room (excluding sender)

    - event: "typing:stop"
      description: Client stops typing
      payload:
        conversationId: string
      response:
        event: "typing:indicator"
        broadcast: to conversation room (excluding sender)

  server-to-client:
    - event: "message:received"
      description: A new message was sent in a conversation the user belongs to
      payload:
        id: string (message ID)
        conversationId: string
        senderId: string (uuid)
        senderName: string
        senderAvatar: string (url, nullable)
        content: string
        type: string (text | image)
        mediaUrl: string (presigned URL, if image)
        createdAt: string (ISO-8601)

    - event: "message:read:ack"
      description: Messages were read by another participant
      payload:
        conversationId: string
        messageId: string (read up to)
        readBy: string (uuid of reader)
        readAt: string (ISO-8601)

    - event: "typing:indicator"
      description: Another user is typing in a conversation
      payload:
        conversationId: string
        userId: string (uuid)
        displayName: string
        isTyping: boolean

    - event: "user:online"
      description: A friend came online
      payload:
        userId: string (uuid)

    - event: "user:offline"
      description: A friend went offline
      payload:
        userId: string (uuid)

# =======================================================================
# SECTION 3 — Async / Event-driven (x-async-events extension)
# =======================================================================

x-async-events:
  enabled: true
  broker: redis
  brokerUrl: redis://redis:6379

  publishes:
    - channel: message.sent
      description: Emitted when a message is sent to an offline recipient (for push notification)
      analysisRef: "DDD 2.2 Domain Event: MessageSent"
      message:
        name: MessageSentEvent
        fields:
          - name: eventId,        type: string (uuid)
          - name: senderId,       type: string (uuid)
          - name: conversationId, type: string
          - name: recipientId,    type: string (uuid), description: Offline recipient to notify
          - name: preview,        type: string, description: First 100 chars of message
          - name: occurredAt,     type: string (ISO-8601 datetime)

    - channel: group.member.added
      description: Emitted when a new member is added to a group chat
      analysisRef: "DDD 2.2 Domain Event: GroupMemberAdded"
      message:
        name: GroupMemberAddedEvent
        fields:
          - name: eventId,       type: string (uuid)
          - name: groupId,       type: string
          - name: groupName,     type: string
          - name: addedUserId,   type: string (uuid)
          - name: addedByUserId, type: string (uuid)
          - name: occurredAt,    type: string (ISO-8601 datetime)

# =======================================================================
# Shared Schemas
# =======================================================================

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    Conversation:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [direct, group]
        participants:
          type: array
          items:
            $ref: '#/components/schemas/Participant'
        lastMessage:
          $ref: '#/components/schemas/MessagePreview'
          nullable: true
        unreadCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Participant:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        isOnline:
          type: boolean

    MessagePreview:
      type: object
      properties:
        content:
          type: string
          description: First 100 chars
        senderId:
          type: string
          format: uuid
        senderName:
          type: string
        createdAt:
          type: string
          format: date-time

    Message:
      type: object
      properties:
        id:
          type: string
        conversationId:
          type: string
        senderId:
          type: string
          format: uuid
        senderName:
          type: string
        senderAvatar:
          type: string
          format: uri
          nullable: true
        content:
          type: string
        type:
          type: string
          enum: [text, image]
        mediaUrl:
          type: string
          format: uri
          nullable: true
          description: Presigned URL (if type is image)
        readBy:
          type: array
          items:
            type: object
            properties:
              userId:
                type: string
                format: uuid
              readAt:
                type: string
                format: date-time
        createdAt:
          type: string
          format: date-time

    MessageHistory:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        hasMore:
          type: boolean
        nextCursor:
          type: string
          nullable: true

    CreateGroupRequest:
      type: object
      required: [name, memberIds]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          example: "3A Friends"
        memberIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
          description: User IDs to add (creator is added automatically as admin)
        avatarUrl:
          type: string
          format: uri
          nullable: true

    GroupChat:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        avatarUrl:
          type: string
          format: uri
          nullable: true
        members:
          type: array
          items:
            type: object
            properties:
              userId:
                type: string
                format: uuid
              displayName:
                type: string
              avatarUrl:
                type: string
                format: uri
                nullable: true
              role:
                type: string
                enum: [admin, member]
              joinedAt:
                type: string
                format: date-time
        memberCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    PaginatedConversations:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Conversation'
        pagination:
          $ref: '#/components/schemas/Pagination'

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
